<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fly Notes</title>
  <style>
    :root{
      --bg:#eef7fc;--panel:#ffffff;--soft:#f5f9fd;--text:#111827;--muted:#6b7280;--line:#dce7f2;
      --blue:#49a5e5;--blue2:#2563eb;--danger:#ef4444;--shadow:0 24px 70px rgba(15,23,42,.13)
    }
    *{box-sizing:border-box} body{margin:0;height:100vh;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,sans-serif;color:var(--text);background:linear-gradient(135deg,#f8fdff,#e8f2fa)}
    button,input,select{font:inherit} button{cursor:pointer;border:0} .hidden{display:none!important}
    .app{height:100vh;display:grid;grid-template-rows:70px 1fr}.top{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(255,255,255,.8);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
    .brand{display:flex;align-items:center;gap:12px}.brandHome{border:0;background:transparent;padding:0;text-align:left;box-shadow:none}.brandHome:hover{opacity:.88}.logoBox{width:86px;height:46px;border-radius:18px;background:#dff7ff;display:grid;place-items:center;box-shadow:0 12px 28px rgba(73,165,229,.22);overflow:hidden}
    .flyLogoImg{display:block;width:78px;height:auto;object-fit:contain;border-radius:12px}
    h1{margin:0;font-size:25px;letter-spacing:-.05em}.sub{margin:1px 0 0;color:var(--muted);font-size:12px;font-weight:700}.btn{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 14px;font-size:13px;font-weight:800;color:var(--text);box-shadow:0 4px 12px rgba(15,23,42,.03)}.btn:hover{background:#f7fbff}.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn.dark{background:#111827;border-color:#111827;color:#fff}.btn.danger{color:var(--danger)}.btn.small{padding:7px 10px;border-radius:11px;font-size:12px}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.home{height:100%;overflow:auto;padding:34px}.hero{max-width:1100px;margin:0 auto 24px;display:flex;align-items:end;justify-content:space-between;gap:20px}.hero h2{font-size:clamp(34px,5vw,60px);line-height:.95;letter-spacing:-.075em;margin:0}.hero p{margin:12px 0 0;color:var(--muted);font-weight:700}.search{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px 14px;display:flex;gap:8px;align-items:center;width:min(340px,100%)}.search input{border:0;outline:0;width:100%;background:transparent}
    .grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}.book{background:rgba(255,255,255,.88);border:1px solid var(--line);border-radius:26px;padding:16px;text-align:left;min-height:240px;box-shadow:0 18px 48px rgba(15,23,42,.07);transition:.15s}.book:hover{transform:translateY(-3px)}.cover{height:160px;border:1px solid #dbe7f2;border-radius:20px;background:#fff;position:relative;overflow:hidden;margin-bottom:12px}.cover .mini{position:absolute;right:12px;top:10px;width:54px;height:34px;border-radius:12px;background:#dff7ff;display:grid;place-items:center}.book h3{margin:0;font-size:16px;letter-spacing:-.03em}.book p{margin:5px 0 0;color:var(--muted);font-size:12px;font-weight:700}
    .editor{height:100%;display:grid;grid-template-columns:230px 1fr 250px}.left,.right{background:rgba(255,255,255,.78);border-color:var(--line);display:flex;flex-direction:column;min-width:0}.left{border-right:1px solid var(--line)}.right{border-left:1px solid var(--line)}.pad{padding:15px}.titleInput{width:100%;border:0;outline:0;background:transparent;font-size:20px;font-weight:900;letter-spacing:-.05em;margin-bottom:12px}.pages{flex:1;overflow:auto;padding:0 14px 14px;display:grid;gap:12px;align-content:start}.thumb{background:#fff;border:1px solid var(--line);border-radius:16px;padding:8px;text-align:left}.thumb.active{border-color:var(--blue);box-shadow:0 10px 24px rgba(73,165,229,.18)}.miniPage{aspect-ratio:3/4;border:1px solid #dbe7f2;border-radius:10px;background:#fff;overflow:hidden}.miniPage canvas{width:100%;height:100%;display:block}.thumbLabel{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted);font-weight:800}
    .center{display:grid;grid-template-rows:58px 1fr 56px;min-width:0}.toolbar,.bottom{background:rgba(255,255,255,.76);border-color:var(--line);display:flex;align-items:center;justify-content:space-between;padding:9px 12px;gap:8px}.toolbar{border-bottom:1px solid var(--line)}.bottom{border-top:1px solid var(--line)}.stage{position:relative;overflow:hidden;display:grid;place-items:center;background:radial-gradient(circle,rgba(73,165,229,.09),transparent 38%)}.paperWrap{width:min(800px,calc(100% - 60px));height:min(1067px,calc(100% - 46px));transform-origin:center}.paper{width:100%;height:100%;position:relative;background:#fff;border:1px solid #dbe7f2;border-radius:18px;box-shadow:0 24px 70px rgba(15,23,42,.16);overflow:hidden}.paper canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}.overlay{pointer-events:none}.textBox{position:absolute;z-index:5;min-width:120px;min-height:44px;padding:8px 10px;border:1px dashed var(--blue);border-radius:10px;background:rgba(255,255,255,.75);outline:0;resize:both;overflow:auto;font-size:18px;line-height:1.45}
    .textBox:not(:focus){border-color:transparent;background:transparent;resize:none}
    .section{margin:0 0 9px;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.06em}.stack{display:flex;flex-direction:column;gap:10px}.range{display:grid;grid-template-columns:1fr 38px;gap:8px;align-items:center}.badge{background:#eef5fb;color:var(--muted);border-radius:999px;padding:5px 8px;font-size:11px;font-weight:900;text-align:center}input[type=range]{width:100%;accent-color:var(--blue)}.swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.swatch{aspect-ratio:1;border-radius:999px;border:3px solid #fff;outline:1px solid var(--line)}.swatch.active{outline:3px solid var(--blue);transform:scale(.92)}select{width:100%;border:1px solid var(--line);border-radius:13px;background:#fff;padding:9px 10px;font-weight:700}
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.38);display:none;place-items:center;padding:20px;z-index:50}.modal.show{display:grid}.modalBox{width:min(760px,100%);background:#fff;border-radius:28px;padding:24px;box-shadow:var(--shadow)}.modalHead{display:flex;justify-content:space-between;gap:12px;align-items:start;margin-bottom:14px}.modalHead h2{margin:0;font-size:26px;letter-spacing:-.05em}.nameInput{width:100%;border:1px solid var(--line);border-radius:15px;padding:12px 14px;outline:0;margin-bottom:14px}.templates{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.template{background:#fff;border:1px solid var(--line);border-radius:20px;padding:12px;text-align:left}.template:hover{border-color:var(--blue)}.preview{aspect-ratio:3/4;border:1px solid #dbe7f2;border-radius:14px;margin-bottom:10px}.blank{background:#fff}.lined{background:linear-gradient(#e7eef7 1px,transparent 1px);background-size:100% 24px}.cornell{background:linear-gradient(90deg,transparent 32%,#f5b4b4 32.5%,transparent 33%),linear-gradient(#e7eef7 1px,transparent 1px);background-size:100% 100%,100% 24px}.legal{background:linear-gradient(90deg,transparent 13%,#f5b4b4 13.5%,transparent 14%),linear-gradient(#e7eef7 1px,transparent 1px);background-size:100% 100%,100% 24px}.template h3{margin:0;font-size:14px}.template p{margin:5px 0 0;color:var(--muted);font-size:12px}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(15px);opacity:0;background:#111827;color:#fff;border-radius:999px;padding:11px 16px;font-size:13px;font-weight:900;transition:.18s;z-index:80}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:1000px){.editor{grid-template-columns:190px 1fr}.right{display:none}.templates{grid-template-columns:repeat(2,1fr)}}@media(max-width:700px){.left{display:none}.editor{grid-template-columns:1fr}.hero{display:block}.paperWrap{width:calc(100% - 24px);height:calc(100% - 30px)}}
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <button class="brand brandHome" id="homeBtn" title="홈으로 이동">
        <div class="logoBox" id="mainLogo"></div>
        <div><h1>Fly Notes</h1><p class="sub">clean handwriting notebook</p></div>
      </button>
      <div class="row"><button class="btn primary" id="newBtn">+ Notebook</button></div>
    </header>

    <section id="home" class="home">
      <div class="hero"><div><h2>Fly Notes</h2><p>홈에서 노트북을 만들고 빈종이, 줄노트, Cornell, Legal 중 선택하세요.</p></div><label class="search">⌕<input id="search" placeholder="노트북 검색"></label></div>
      <div class="grid" id="books"></div>
    </section>

    <section id="editor" class="editor hidden">
      <aside class="left"><div class="pad"><input id="bookTitle" class="titleInput"><div class="row"><button class="btn small primary" id="addPage">+ 페이지</button><button class="btn small danger" id="delPage">삭제</button></div></div><div class="pages" id="pages"></div></aside>
      <main class="center"><div class="toolbar"><div class="row"><button class="btn small dark" data-tool="pen">펜</button><button class="btn small" data-tool="highlighter">형광펜</button><button class="btn small" data-tool="eraser">지우개</button><button class="btn small" data-tool="shape">도형</button><button class="btn small" data-tool="text">텍스트</button><button class="btn small" id="undo">↶</button><button class="btn small" id="redo">↷</button></div><div class="row"><span class="badge" id="pageInfo">1 / 1</span><button class="btn small" id="png">PNG</button></div></div>
        <div class="stage" id="stage"><div class="paperWrap" id="paperWrap"><div class="paper" id="paper"><canvas id="canvas"></canvas><canvas id="overlay" class="overlay"></canvas></div></div></div>
        <div class="bottom"><div class="row"><button class="btn small" id="prev">‹ 이전</button><button class="btn small" id="next">다음 ›</button></div><div class="row"><button class="btn small" id="zoomOut">-</button><span class="badge" id="zoomText">100%</span><button class="btn small" id="zoomIn">+</button><button class="btn small" id="fit">맞춤</button></div></div></main>
      <aside class="right"><div class="pad stack"><div><p class="section">펜 굵기</p><div class="range"><input id="size" type="range" min="1" max="34" value="5"><span class="badge" id="sizeText">5</span></div></div><div><p class="section">필기 보정</p><div class="range"><input id="smooth" type="range" min="0" max="90" value="40"><span class="badge" id="smoothText">40</span></div></div><div><p class="section">색상</p><div class="swatches" id="swatches"></div></div><div><p class="section">도형</p><select id="shape"><option value="line">선</option><option value="rect">사각형</option><option value="circle">원</option><option value="arrow">화살표</option></select></div><div><p class="section">템플릿</p><div class="stack"><button class="btn" data-template="blank">빈종이</button><button class="btn" data-template="lined">줄노트</button><button class="btn" data-template="cornell">Cornell</button><button class="btn" data-template="legal">Legal</button></div></div><button class="btn danger" id="clear">페이지 비우기</button></div></aside>
    </section>
  </div>

  <div class="modal" id="modal"><div class="modalBox"><div class="modalHead"><div><h2>새 Notebook</h2><p class="sub">종이 템플릿을 선택하면 바로 만들어집니다.</p></div><button class="btn" id="close">닫기</button></div><input id="newTitle" class="nameInput" value="새 노트북" placeholder="노트북 이름"><div class="templates"><button class="template" data-create="blank"><div class="preview blank"></div><h3>빈종이</h3><p>그림/자유 필기</p></button><button class="template" data-create="lined"><div class="preview lined"></div><h3>줄노트</h3><p>일반 필기</p></button><button class="template" data-create="cornell"><div class="preview cornell"></div><h3>Cornell</h3><p>키워드/요약 분리</p></button><button class="template" data-create="legal"><div class="preview legal"></div><h3>Legal</h3><p>왼쪽 마진</p></button></div></div></div>
  <div class="toast" id="toast"></div>

  <script>
    const W=900,H=1200,KEY='fly-notes-working-v1';
    const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
    const canvas=$('#canvas'), overlay=$('#overlay'), ctx=canvas.getContext('2d'), octx=overlay.getContext('2d');
    const colors=['#111827','#2563eb','#49a5e5','#8b5cf6','#ef4444','#10b981','#f59e0b','#ec4899','#64748b','#facc15'];
    let state=load(), activeBook=state.activeBook||state.books[0].id, activePage=state.activePage||0, tool='pen', ink='#111827', penSize=5, smooth=40, zoom=1;
    let drawing=false,start=null,last=null,current=null;

    $('#mainLogo').innerHTML=logo();
    function id(){return crypto.randomUUID()} function now(){return Date.now()}
    function page(t){return{id:id(),template:t,strokes:[],shapes:[],texts:[],updated:now()}} function book(title,t){return{id:id(),title,template:t,pages:[page(t)],undo:[],redo:[],created:now(),updated:now()}}
    function load(){try{let s=JSON.parse(localStorage.getItem(KEY)); if(s&&s.books&&s.books.length)return s}catch{} return{books:[book('과학 필기','lined')],activeBook:null,activePage:0}}
    function save(msg=false){state.activeBook=activeBook;state.activePage=activePage;localStorage.setItem(KEY,JSON.stringify(state)); if(msg)toast('저장됨')}
    function B(){return state.books.find(b=>b.id===activeBook)||state.books[0]} function P(){let b=B();activePage=Math.max(0,Math.min(activePage,b.pages.length-1));return b.pages[activePage]}
    function snap(){let b=B();b.undo.push(JSON.stringify(b.pages));if(b.undo.length>80)b.undo.shift();b.redo=[]}
    function toast(t){let e=$('#toast');e.textContent=t;e.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove('show'),1000)}
    function showHome(){ $('#home').classList.remove('hidden');$('#editor').classList.add('hidden');renderHome();save() } function showEditor(){ $('#home').classList.add('hidden');$('#editor').classList.remove('hidden');setTimeout(()=>{resize();fit();renderAll()},0);save() }
    function renderHome(){let q=$('#search').value.toLowerCase();let box=$('#books');box.innerHTML='';state.books.filter(b=>b.title.toLowerCase().includes(q)).forEach(b=>{let e=document.createElement('button');e.className='book';e.innerHTML=`<div class="cover ${b.template}"><div class="mini">${logo(44)}</div></div><h3>${esc(b.title)}</h3><p>${b.pages.length} pages · ${name(b.template)}</p>`;e.onclick=()=>{activeBook=b.id;activePage=0;showEditor()};box.appendChild(e)})}
    function name(t){return{blank:'빈종이',lined:'줄노트',cornell:'Cornell',legal:'Legal'}[t]||t} function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
    function resize(){let d=window.devicePixelRatio||1;[canvas,overlay].forEach(c=>{c.width=W*d;c.height=H*d;c.getContext('2d').setTransform(d,0,0,d,0,0)});renderPage()}
    function renderAll(){ $('#bookTitle').value=B().title; renderTools(); renderPage(); renderPages(); save() }
    function renderTools(){ $$('[data-tool]').forEach(b=>b.classList.toggle('dark',b.dataset.tool===tool));$('#sizeText').textContent=penSize;$('#smoothText').textContent=smooth }
    function renderPage(){let p=P(); clearTexts(); ctx.clearRect(0,0,W,H);octx.clearRect(0,0,W,H);template(p.template,ctx);p.strokes.forEach(s=>stroke(s,ctx));p.shapes.forEach(s=>shape(s,ctx));p.texts.forEach(addText);$('#pageInfo').textContent=`${activePage+1} / ${B().pages.length}`;$('#zoomText').textContent=Math.round(zoom*100)+'%';$('#paperWrap').style.transform=`scale(${zoom})`}
    function template(t,c){c.fillStyle='white';c.fillRect(0,0,W,H);c.save();if(t!=='blank'){c.strokeStyle='#e5edf5';c.lineWidth=1;for(let y=82;y<H-36;y+=36)line(c,70,y,W-60,y)}if(t==='cornell'){c.strokeStyle='#f3b2b2';line(c,300,0,300,H);line(c,0,H-210,W,H-210);c.fillStyle='#94a3b8';c.font='700 16px sans-serif';c.fillText('Cues',90,58);c.fillText('Notes',326,58);c.fillText('Summary',90,H-170)}if(t==='legal'){c.strokeStyle='#f3b2b2';line(c,110,0,110,H)}c.restore()}
    function renderPages(){let list=$('#pages');list.innerHTML='';B().pages.forEach((p,i)=>{let e=document.createElement('button');e.className='thumb '+(i===activePage?'active':'');e.innerHTML=`<div class="miniPage"><canvas width="180" height="240"></canvas></div><div class="thumbLabel"><span>Page ${i+1}</span><span>${name(p.template)}</span></div>`;e.onclick=()=>{activePage=i;renderAll()};list.appendChild(e);mini(e.querySelector('canvas'),p)})}
    function mini(c,p){let m=c.getContext('2d');m.save();m.scale(c.width/W,c.height/H);template(p.template,m);p.strokes.forEach(s=>stroke(s,m));p.shapes.forEach(s=>shape(s,m));m.restore()}
    function stroke(s,c){if(!s.points.length)return;c.save();c.globalAlpha=s.alpha;c.globalCompositeOperation=s.tool==='eraser'?'destination-out':'source-over';c.strokeStyle=s.color;c.lineWidth=s.size;c.lineCap='round';c.lineJoin='round';c.beginPath();c.moveTo(s.points[0].x,s.points[0].y);for(let i=1;i<s.points.length;i++){let a=s.points[i-1],b=s.points[i],mx=(a.x+b.x)/2,my=(a.y+b.y)/2;c.quadraticCurveTo(a.x,a.y,mx,my)}c.stroke();c.restore()}
    function shape(s,c){c.save();c.strokeStyle=s.color;c.lineWidth=s.size;c.lineCap='round';let{x,y,w,h}=s;c.beginPath();if(s.kind==='line'){c.moveTo(x,y);c.lineTo(x+w,y+h);c.stroke()}if(s.kind==='rect')c.strokeRect(x,y,w,h);if(s.kind==='circle'){c.ellipse(x+w/2,y+h/2,Math.abs(w/2),Math.abs(h/2),0,0,Math.PI*2);c.stroke()}if(s.kind==='arrow'){let x2=x+w,y2=y+h,a=Math.atan2(y2-y,x2-x),len=18;c.moveTo(x,y);c.lineTo(x2,y2);c.stroke();c.beginPath();c.moveTo(x2,y2);c.lineTo(x2-len*Math.cos(a-Math.PI/6),y2-len*Math.sin(a-Math.PI/6));c.moveTo(x2,y2);c.lineTo(x2-len*Math.cos(a+Math.PI/6),y2-len*Math.sin(a+Math.PI/6));c.stroke()}c.restore()}
    function addText(o){let n=document.createElement('div');n.className='textBox';n.contentEditable=true;n.textContent=o.text;n.style.left=o.x/W*100+'%';n.style.top=o.y/H*100+'%';n.style.width=o.w/W*100+'%';n.style.minHeight=o.h/H*100+'%';n.style.color=o.color;n.onpointerdown=e=>e.stopPropagation();n.oninput=()=>{o.text=n.textContent;save()};n.onblur=()=>{let pr=$('#paper').getBoundingClientRect(),r=n.getBoundingClientRect();o.x=(r.left-pr.left)/pr.width*W;o.y=(r.top-pr.top)/pr.height*H;o.w=r.width/pr.width*W;o.h=r.height/pr.height*H;renderPages();save(true)};$('#paper').appendChild(n)}
    function clearTexts(){document.querySelectorAll('.textBox').forEach(e=>e.remove())} function line(c,x1,y1,x2,y2){c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke()}
    function pt(e){let r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H,pressure:e.pressure||.5}} function smoothPt(a,b){if(!a)return b;let k=1-(smooth/100*.72);return{x:a.x+(b.x-a.x)*k,y:a.y+(b.y-a.y)*k,pressure:b.pressure}}
    function down(e){let p=pt(e);drawing=true;start=last=p;canvas.setPointerCapture(e.pointerId);if(['pen','highlighter','eraser'].includes(tool)){snap();current={tool,color:ink,size:tool==='highlighter'?penSize*3:penSize,alpha:tool==='highlighter'?.32:1,points:[p]}}else if(tool==='text'){snap();P().texts.push({id:id(),x:p.x,y:p.y,w:260,h:70,text:'텍스트 입력',color:ink});drawing=false;renderPage();setTimeout(()=>document.querySelectorAll('.textBox').item(document.querySelectorAll('.textBox').length-1)?.focus(),0);save(true)}}
    function move(e){if(!drawing)return;let p=smoothPt(last,pt(e));last=p;octx.clearRect(0,0,W,H);if(current){current.points.push(p);renderPage();stroke(current,ctx)}else if(tool==='shape'){shape({kind:$('#shape').value,x:start.x,y:start.y,w:p.x-start.x,h:p.y-start.y,color:ink,size:penSize},octx)}}
    function up(e){if(!drawing)return;drawing=false;let p=pt(e),pg=P();if(current){current.points.push(p);pg.strokes.push(current);current=null}else if(tool==='shape'){pg.shapes.push({kind:$('#shape').value,x:start.x,y:start.y,w:p.x-start.x,h:p.y-start.y,color:ink,size:penSize})}octx.clearRect(0,0,W,H);renderPage();renderPages();save(true)}
    function fit(){let r=$('#stage').getBoundingClientRect();zoom=Math.min((r.width-60)/W,(r.height-46)/H,1);renderPage()}
    function undo(){let b=B();if(!b.undo.length)return toast('실행취소 없음');b.redo.push(JSON.stringify(b.pages));b.pages=JSON.parse(b.undo.pop());renderAll()} function redo(){let b=B();if(!b.redo.length)return toast('다시실행 없음');b.undo.push(JSON.stringify(b.pages));b.pages=JSON.parse(b.redo.pop());renderAll()}
    function exportPNG(){renderPage();let a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download=B().title+'-page-'+(activePage+1)+'.png';a.click()}

    $('#homeBtn').onclick=showHome;$('#newBtn').onclick=()=>{$('#modal').classList.add('show');$('#newTitle').focus();$('#newTitle').select()};$('#close').onclick=()=>$('#modal').classList.remove('show');$('#search').oninput=renderHome;$('#bookTitle').oninput=()=>{B().title=$('#bookTitle').value||'제목 없음';save()};
    $$('[data-create]').forEach(b=>b.onclick=()=>{let nb=book($('#newTitle').value.trim()||'새 노트북',b.dataset.create);state.books.unshift(nb);activeBook=nb.id;activePage=0;$('#modal').classList.remove('show');showEditor();toast('노트북 생성됨')});
    $$('[data-tool]').forEach(b=>b.onclick=()=>{tool=b.dataset.tool;renderTools()});$$('[data-template]').forEach(b=>b.onclick=()=>{snap();P().template=b.dataset.template;B().template=b.dataset.template;renderAll();save(true)});
    $('#size').oninput=()=>{penSize=Number($('#size').value);renderTools()};$('#smooth').oninput=()=>{smooth=Number($('#smooth').value);renderTools()};$('#addPage').onclick=()=>{snap();B().pages.splice(activePage+1,0,page(P().template));activePage++;renderAll();save(true)};$('#delPage').onclick=()=>{if(B().pages.length===1)return toast('마지막 페이지는 삭제 불가');snap();B().pages.splice(activePage,1);activePage=Math.max(0,activePage-1);renderAll();save(true)};$('#prev').onclick=()=>{activePage=Math.max(0,activePage-1);renderAll()};$('#next').onclick=()=>{activePage=Math.min(B().pages.length-1,activePage+1);renderAll()};$('#zoomIn').onclick=()=>{zoom=Math.min(1.8,zoom+.1);renderPage()};$('#zoomOut').onclick=()=>{zoom=Math.max(.3,zoom-.1);renderPage()};$('#fit').onclick=fit;$('#undo').onclick=undo;$('#redo').onclick=redo;$('#png').onclick=exportPNG;$('#clear').onclick=()=>{if(confirm('현재 페이지를 비울까요?')){snap();Object.assign(P(),{strokes:[],shapes:[],texts:[]});renderAll();save(true)}};
    canvas.addEventListener('pointerdown',down);canvas.addEventListener('pointermove',move);canvas.addEventListener('pointerup',up);canvas.addEventListener('pointercancel',up);window.addEventListener('resize',()=>{resize();fit()});window.addEventListener('beforeunload',()=>save());window.addEventListener('keydown',e=>{let m=e.metaKey||e.ctrlKey;if(m&&e.key.toLowerCase()==='z'){e.preventDefault();e.shiftKey?redo():undo()}if(m&&e.key.toLowerCase()==='y'){e.preventDefault();redo()}});
    colors.forEach(c=>{let b=document.createElement('button');b.className='swatch '+(c===ink?'active':'');b.style.background=c;b.onclick=()=>{ink=c;$$('.swatch').forEach(x=>x.classList.remove('active'));b.classList.add('active')};$('#swatches').appendChild(b)});
    renderHome();resize();
  </script>
</body>
</html>
