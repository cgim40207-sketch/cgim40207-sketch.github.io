<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Fly Notes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
 
  :root{
    --ink:#15171C;
    --ink-soft:#5B6270;
    --ink-faint:#9AA0AC;
    --paper:#FFFFFF;
    --bg:#F5F7FA;
    --line:#15171C;
    --line-soft:#DEE3EA;
    --blue:#1FA9E0;
    --blue-deep:#1487B5;
    --blue-soft:#E4F6FC;
    --amber:#FFC24B;
    --danger:#E15353;
    --danger-soft:#FDE8E8;
    --green:#2FAE66;
    --radius:16px;
    --radius-lg:22px;
    --shadow:0 10px 30px rgba(21,23,28,0.10);
    --shadow-sm:0 2px 10px rgba(21,23,28,0.06);
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', system-ui, sans-serif;
  }
 
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0; font-family:var(--font-body); color:var(--ink); background:var(--bg);
    overflow:hidden; -webkit-tap-highlight-color:transparent;
  }
  button, input{ font-family:inherit; }
  :focus-visible{ outline:2px solid var(--blue); outline-offset:2px; border-radius:6px; }
 
  #app{ height:100vh; width:100vw; position:relative; }
 
  .logo-badge{
    width:38px; height:38px; border-radius:11px; border:2px solid var(--line); background:var(--paper);
    display:flex; align-items:center; justify-content:center; flex:none;
  }
  .logo-badge svg{ width:26px; height:17px; }
  .logo-badge.sm{ width:32px; height:32px; border-radius:9px; }
  .logo-badge.sm svg{ width:22px; height:14px; }
  .wordmark{ font-family:var(--font-display); font-weight:700; font-size:19px; letter-spacing:-0.01em; }
 
  /* ---------- Buttons ---------- */
  .outline-btn{
    display:inline-flex; align-items:center; gap:6px; border:2px solid var(--line); background:var(--paper);
    color:var(--ink); font-weight:600; font-size:13.5px; padding:8px 14px; border-radius:999px; cursor:pointer;
  }
  .outline-btn:hover{ background:var(--bg); }
  .outline-btn svg{ width:15px; height:15px; }
  .fill-btn{
    display:inline-flex; align-items:center; gap:7px; border:none; background:var(--ink); color:#fff;
    font-weight:600; font-size:13.5px; padding:9px 15px; border-radius:999px; cursor:pointer;
  }
  .fill-btn:hover{ background:#000; }
  .fill-btn.danger{ background:var(--danger); }
  .fill-btn.danger:hover{ background:#c23f3f; }
  .icon-btn{
    width:36px; height:36px; border:none; background:transparent; color:var(--ink-soft); border-radius:10px;
    display:flex; align-items:center; justify-content:center; cursor:pointer; flex:none;
  }
  .icon-btn:hover{ background:var(--bg); color:var(--ink); }
  .icon-btn.danger-hover:hover{ background:var(--danger-soft); color:var(--danger); }
  .icon-btn svg{ width:18px; height:18px; }
  .icon-btn:disabled{ opacity:.32; cursor:default; }
  .icon-btn:disabled:hover{ background:transparent; color:var(--ink-soft); }
 
  /* ============================= HOME VIEW ============================= */
  #homeView{ height:100%; display:flex; flex-direction:column; }
  #homeTopbar{ display:flex; align-items:center; gap:10px; padding:16px 22px; border-bottom:1px solid var(--line-soft); flex:none; }
  #homeTopbar .brand-cluster{ display:flex; align-items:center; gap:10px; }
  #homeTopbar .spacer{ flex:1; }
 
  #homeBody{ flex:1; overflow-y:auto; padding:22px; }
  .section-label{ font-size:12.5px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-faint); margin:2px 0 16px; }
 
  #notesGrid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:22px 18px; max-width:1200px;
  }
  .note-card-wrap{ display:flex; flex-direction:column; gap:8px; }
  .note-card{
    position:relative; aspect-ratio: 1240 / 1754; border:2px solid var(--line); border-radius:var(--radius-lg);
    background:var(--paper); cursor:pointer; overflow:hidden; box-shadow:var(--shadow-sm); transition:transform .1s ease, box-shadow .1s ease;
  }
  .note-card:hover{ transform:translateY(-2px); box-shadow:var(--shadow); }
  .note-card img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card-kebab{
    position:absolute; top:6px; right:6px; width:28px; height:28px; border-radius:8px; border:1px solid var(--line-soft);
    background:rgba(255,255,255,0.96); color:var(--ink-soft); display:flex; align-items:center; justify-content:center;
    cursor:pointer; box-shadow:var(--shadow-sm);
  }
  .card-kebab:hover{ color:var(--blue-deep); border-color:var(--blue); background:var(--blue-soft); }
  .card-kebab svg{ width:14px; height:14px; }
  .note-name-input{
    border:none; background:transparent; font-size:13px; color:var(--ink-soft); text-align:center; padding:4px 4px;
    border-radius:6px; width:100%; font-style:italic;
  }
  .note-name-input:focus{ background:var(--paper); border:1px solid var(--line-soft); font-style:normal; color:var(--ink); outline:none; }
 
  #homeEmptyState{ display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; height:70%; color:var(--ink-faint); text-align:center; }
  #homeEmptyState .logo-badge{ width:56px; height:56px; border-radius:16px; }
  #homeEmptyState .logo-badge svg{ width:36px; height:24px; }
  #homeEmptyState p{ margin:0; font-size:14px; max-width:260px; line-height:1.5; }
 
  /* ============================= Template picker ============================= */
  .tpl-blank{ background-image:none; }
  .tpl-dots{ background-image:radial-gradient(circle, var(--line-soft) 1px, transparent 1px); background-size:26px 26px; }
  .tpl-lined-narrow{ background-image:repeating-linear-gradient(to bottom, var(--line-soft) 0 1px, transparent 1px 24px); }
  .tpl-lined-thick{ background-image:repeating-linear-gradient(to bottom, var(--line-soft) 0 1px, transparent 1px 44px); }
  .tpl-legal{ background-image:repeating-linear-gradient(to bottom, #CFE0F5 0 1px, transparent 1px 34px), linear-gradient(to right, transparent 0 11.5%, #F2B8B8 11.5% 12%, transparent 12%); }
  .tpl-column{ background-image:repeating-linear-gradient(to right, var(--line-soft) 0 1px, transparent 1px 90px); }
 
  .template-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-top:4px; }
  .template-cell{ border:2px solid transparent; background:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px; padding:6px; border-radius:12px; }
  .template-cell:hover{ background:var(--bg); }
  .template-cell.selected{ border-color:var(--blue); background:var(--blue-soft); }
  .template-preview{ width:100%; aspect-ratio:1240/1754; border:1.5px solid var(--line-soft); border-radius:8px; background-color:#fff; }
  .template-cell span{ font-size:11px; font-weight:600; color:var(--ink-soft); text-align:center; }
 
  /* ============================= EDITOR VIEW ============================= */
  #editorView{ height:100%; display:none; flex-direction:column; }
  #editorTopbar{ display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--line-soft); flex:none; }
  .title-cluster{ display:flex; flex-direction:column; margin-right:6px; min-width:44px; flex:none; }
  #noteTitle{
    font-family:var(--font-display); font-weight:600; font-size:14px; border:none; outline:none; background:transparent;
    padding:2px 4px; border-radius:6px; max-width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  #noteTitle:focus{ background:var(--bg); }
 
  #toolRect{
    flex:1; display:flex; align-items:center; gap:2px; border:2px solid var(--line); border-radius:999px;
    padding:5px 8px; overflow-x:auto; max-width:640px;
  }
  .tool-btn{
    width:36px; height:36px; flex:none; border:2px solid transparent; border-radius:999px; background:transparent;
    color:var(--ink-soft); display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .tool-btn:hover{ background:var(--bg); }
  .tool-btn svg{ width:17px; height:17px; }
  .tool-btn.active{ border-color:var(--blue); background:var(--blue-soft); color:var(--blue-deep); }
  .tool-divider{ width:1px; height:20px; background:var(--line-soft); flex:none; margin:0 4px; }
 
  .topbar-spacer{ flex:1; }
  #editorTopbar .right-cluster{ display:flex; align-items:center; gap:2px; flex:none; }
 
  #styleRow{
    display:none; align-items:center; gap:14px; padding:8px 16px; border-bottom:1px solid var(--line-soft); flex:none; overflow-x:auto;
  }
  #styleRow.visible{ display:flex; }
  .swatch-row{ display:flex; align-items:center; gap:6px; }
  .swatch{ width:20px; height:20px; border-radius:50%; border:2px solid transparent; cursor:pointer; padding:0; }
  .swatch.active{ border-color:var(--ink); }
  #customColorInput{ width:22px; height:22px; border:none; padding:0; background:none; cursor:pointer; border-radius:50%; }
  #customColorInput::-webkit-color-swatch-wrapper{ padding:0; }
  #customColorInput::-webkit-color-swatch{ border:2px solid var(--line-soft); border-radius:50%; }
  .width-slider-wrap{ display:flex; align-items:center; gap:8px; }
  #widthSlider{
    -webkit-appearance:none; appearance:none; width:120px; height:20px; background:transparent; cursor:pointer; margin:0;
  }
  #widthSlider::-webkit-slider-runnable-track{ height:2px; background:var(--line); border-radius:2px; }
  #widthSlider::-webkit-slider-thumb{
    -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--paper);
    border:2.5px solid var(--blue); margin-top:-8px; box-shadow:var(--shadow-sm);
  }
  #widthSlider::-moz-range-track{ height:2px; background:var(--line); border-radius:2px; }
  #widthSlider::-moz-range-thumb{
    width:18px; height:18px; border-radius:50%; background:var(--paper); border:2.5px solid var(--blue); box-shadow:var(--shadow-sm);
  }
  #widthValue{ font-size:11.5px; font-weight:600; color:var(--ink-soft); min-width:30px; }
  .style-divider{ width:1px; height:18px; background:var(--line-soft); }
 
  #canvasArea{ flex:1; overflow:auto; padding:24px; display:flex; flex-direction:column; align-items:center; gap:16px; background:var(--bg); position:relative; }
  #canvasWrap{ width:min(860px, 100%); flex:none; transform-origin: top center; }
  .page-surface{
    position:relative; width:100%; aspect-ratio:1240/1754; background-color:var(--paper);
    border-radius:var(--radius); border:2px solid var(--line);
    box-shadow:var(--shadow); overflow:hidden; touch-action:none;
  }
  .page-surface.pan-mode{ touch-action: pan-x pan-y; }
  #ink-canvas, #overlay-canvas{ position:absolute; inset:0; width:100%; height:100%; }
  #overlay-canvas{ pointer-events:none; }
  #brushCursor{
    position:absolute; border:1.5px solid var(--ink-soft); background:rgba(31,169,224,0.10);
    border-radius:50%; pointer-events:none; transform:translate(-50%,-50%); display:none; z-index:5;
  }
  #emptyHint{
    position:absolute; top:40%; left:0; right:0; text-align:center; color:var(--ink-faint);
    font-size:14px; pointer-events:none; user-select:none;
  }
 
  /* ---------- Page navigator ---------- */
  #pageNav{
    flex:none; display:flex; align-items:center; gap:2px;
    background:var(--paper); border:1.5px solid var(--line-soft); border-radius:999px; padding:5px; box-shadow:var(--shadow-sm);
    margin-bottom:8px;
  }
  #pageIndicator{ font-size:12px; font-weight:600; color:var(--ink-soft); padding:0 8px; white-space:nowrap; min-width:80px; text-align:center; }
  .pagenav-divider{ width:1px; height:20px; background:var(--line-soft); margin:0 3px; flex:none; }
 
  /* ============================= Spotlight ============================= */
  #spotlightOverlay{
    position:fixed; inset:0; background:rgba(21,23,28,0.38); display:none; align-items:flex-start; justify-content:center;
    padding-top:min(12vh, 110px); z-index:110;
  }
  #spotlightOverlay.open{ display:flex; }
  #spotlightBox{ width:min(560px, 92vw); max-height:74vh; background:var(--paper); border-radius:var(--radius-lg); box-shadow:var(--shadow); display:flex; flex-direction:column; overflow:hidden; }
  .spotlight-search-row{ display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--line-soft); flex:none; }
  .spotlight-search-row svg.mag{ width:18px; height:18px; color:var(--ink-faint); flex:none; }
  #spotlightInput{ flex:1; border:none; outline:none; font-size:15px; background:transparent; }
  #spotlightBody{ overflow-y:auto; padding:14px 16px 20px; }
 
  .spotlight-section-title{ font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-faint); margin:16px 0 8px; }
  .spotlight-result{ background:var(--bg); border-radius:12px; padding:11px 12px; font-size:13px; line-height:1.55; white-space:pre-wrap; max-height:200px; overflow-y:auto; }
  .spotlight-result.empty{ color:var(--ink-faint); font-style:italic; }
 
  .search-hit{ padding:9px 10px; border-radius:10px; cursor:pointer; margin-top:6px; border:1px solid var(--line-soft); }
  .search-hit:hover{ border-color:var(--blue); background:var(--blue-soft); }
  .search-hit .sh-title{ font-weight:600; font-size:12.5px; }
 
  /* ---------- Modal ---------- */
  #modalOverlay{ position:fixed; inset:0; background:rgba(21,23,28,0.32); display:none; align-items:center; justify-content:center; z-index:120; }
  #modalOverlay.open{ display:flex; }
  #modalBox{ background:var(--paper); border-radius:var(--radius-lg); padding:22px; width:320px; box-shadow:var(--shadow); max-height:82vh; overflow-y:auto; }
  #modalBox.wide{ width:380px; }
  #modalBox h3{ margin:0 0 6px; font-family:var(--font-display); font-size:16px; }
  #modalBox p{ margin:0 0 14px; font-size:13px; color:var(--ink-soft); line-height:1.5; }
  #modalBox input[type=text]{ width:100%; padding:9px 11px; border:1.5px solid var(--line-soft); border-radius:10px; font-size:13.5px; outline:none; margin-bottom:14px; }
  #modalBox input[type=text]:focus{ border-color:var(--blue); }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; }
 
  /* ---------- Popover ---------- */
  .popover-menu{ position:fixed; background:var(--paper); border:1.5px solid var(--line-soft); border-radius:12px; box-shadow:var(--shadow); padding:5px; z-index:130; min-width:150px; display:none; }
  .popover-menu.open{ display:block; }
  .popover-menu button{ display:flex; align-items:center; gap:8px; width:100%; text-align:left; background:none; border:none; padding:8px 9px; border-radius:8px; font-size:12.5px; color:var(--ink); cursor:pointer; }
  .popover-menu button:hover{ background:var(--bg); }
  .popover-menu button.danger{ color:var(--danger); }
  .popover-menu button svg{ width:14px; height:14px; }
 
  #settingsPopover{ width:220px; padding:12px; }
  .setting-row{ display:flex; align-items:center; justify-content:space-between; padding:7px 0; font-size:12.5px; }
  .switch{ position:relative; width:36px; height:20px; flex:none; }
  .switch input{ opacity:0; width:0; height:0; }
  .switch .track{ position:absolute; inset:0; background:var(--line-soft); border-radius:999px; transition:.15s; cursor:pointer; }
  .switch .track:before{ content:""; position:absolute; width:16px; height:16px; left:2px; top:2px; background:#fff; border-radius:50%; transition:.15s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
  .switch input:checked + .track{ background:var(--blue); }
  .switch input:checked + .track:before{ transform:translateX(16px); }
  .settings-divider{ height:1px; background:var(--line-soft); margin:6px 0; }
  #clearDataBtn{ width:100%; justify-content:center; color:var(--danger); border:1.5px solid var(--danger-soft); background:var(--danger-soft); margin-top:2px; border-radius:10px; padding:8px; font-size:12.5px; font-weight:600; cursor:pointer; }
  #clearDataBtn:hover{ background:#fbdada; }
 
  /* ---------- Toasts ---------- */
  #toastContainer{ position:fixed; bottom:18px; right:18px; display:flex; flex-direction:column; gap:8px; z-index:200; }
  .toast{ background:var(--ink); color:#fff; padding:10px 14px; border-radius:10px; font-size:12.5px; box-shadow:var(--shadow); animation:toastIn .18s ease; max-width:280px; }
  .toast.error{ background:var(--danger); }
  .toast.success{ background:var(--green); }
  @keyframes toastIn{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }
 
  @media (max-width: 640px){
    #toolRect{ max-width:none; }
    .title-cluster{ min-width:34px; }
    #noteTitle{ max-width:74px; font-size:12.5px; }
    .note-name-input{ font-size:12px; }
    #pageIndicator{ min-width:56px; font-size:11px; }
  }
</style>
</head>
<body>
<div id="app">
 
  <!-- ============================= HOME VIEW ============================= -->
  <div id="homeView">
    <div id="homeTopbar">
      <div class="brand-cluster">
        <div class="logo-badge" id="homeLogoBadge"></div>
        <span class="wordmark">Fly Notes</span>
      </div>
      <div class="spacer"></div>
      <button class="outline-btn" id="newNoteBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        New
      </button>
    </div>
    <div id="homeBody">
      <div class="section-label">Saved notes</div>
      <div id="notesGrid"></div>
      <div id="homeEmptyState">
        <div class="logo-badge" id="emptyLogoBadge"></div>
        <p>No notes yet. Tap "New" to start your first page.</p>
        <button class="fill-btn" id="emptyNewNoteBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Create a note
        </button>
      </div>
    </div>
  </div>
 
  <!-- ============================= EDITOR VIEW ============================= -->
  <div id="editorView">
    <div id="editorTopbar">
      <button class="icon-btn" id="backBtn" title="Back to notes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="logo-badge sm" id="editorLogoBadge"></div>
      <div class="title-cluster">
        <span id="noteTitle" contenteditable="true" spellcheck="false"></span>
      </div>
 
      <div id="toolRect">
        <button class="tool-btn" data-tool="pen" title="Pen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </button>
        <button class="tool-btn" data-tool="paintbrush" title="Paintbrush">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 21c-1.2-3 0.6-5.4 2.8-6.4l7.6-7.6a2.1 2.1 0 0 1 3 3l-7.6 7.6c-1 2.2-3.4 4-5.8 3.4Z"/><path d="M14.5 6.5l3 3"/></svg>
        </button>
        <button class="icon-btn" id="redoBtn" title="Redo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l5-5-5-5"/><path d="M20 9H10a6 6 0 0 0 0 12h2"/></svg>
        </button>
        <button class="icon-btn" id="undoBtn" title="Undo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 0 12h-2"/></svg>
        </button>
        <div class="tool-divider"></div>
        <button class="tool-btn" data-tool="highlighter" title="Highlighter">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11 15 5l4 4-6 6H9v-4Z"/><path d="M5 21l1.5-4.5L11 21H5Z"/></svg>
        </button>
        <button class="tool-btn" data-tool="eraser" title="Eraser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="12" width="15" height="7" rx="1.5" transform="rotate(-18 12.5 15.5)"/><path d="M4 20h9"/></svg>
        </button>
        <div class="tool-divider"></div>
        <button class="icon-btn" id="spotlightBtn" title="Spotlight (Ctrl+K)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </button>
        <button class="icon-btn" id="settingsBtn" title="Settings">

/* Primary: window.storage (persists via Claude's artifact storage).

const LOCAL_KEY_PREFIX = 'flynotes:';

  if(hasWindowStorage()){

      if(res && typeof res.value === 'string') return res.value;
    }catch(e){ console.warn('window.storage.get failed, trying localStorage', e); }
  }
  try{ const v = localStorage.getItem(LOCAL_KEY_PREFIX + key); if(v !== null) return v; }catch(e){ console.warn('localStorage.getItem failed', e); }
  return null;
}
async function storageSet(key, value){
  let ok = false;
  if(hasWindowStorage()){
    for(let attempt = 0; attempt < 2; attempt++){
      try{ await window.storage.set(key, value, false); ok = true; break; }
      catch(e){ console.warn('window.storage.set failed (attempt ' + (attempt+1) + ')', e); await new Promise(r => setTimeout(r, 300)); }
    }
  }
  try{ localStorage.setItem(LOCAL_KEY_PREFIX + key, value); ok = true; }
  catch(e){ console.warn('localStorage.setItem failed', e); }
  return ok;
}
let saveTimer = null;
function scheduleSave(){ clearTimeout(saveTimer); saveTimer = setTimeout(saveState, 500); }
async function saveState(){

const TRASH_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M7 7l1 13h8l1-13"/></svg>';
const KEBAB_ICON = '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>';

/* ============================= Canvas engine ============================= */
const inkCanvas = document.getElementById('ink-canvas');
const overlayCanvas = document.getElementById('overlay-canvas');
const inkCtx = inkCanvas.getContext('2d');
const overlayCtx = overlayCanvas.getContext('2d');
const brushCursor = document.getElementById('brushCursor');
const emptyHint = document.getElementById('emptyHint');
 
let drawing = false, activePointerId = null, currentPts = [];
 
function setCanvasSize(){

/* ---- Touch mode: when finger-drawing is off, a finger pans/zooms instead of drawing ---- */
const canvasWrapEl = document.getElementById('canvasWrap');
const canvasAreaEl = document.getElementById('canvasArea');
let viewZoom = 1;
const MIN_ZOOM = 0.5, MAX_ZOOM = 3;
const activeGestureTouches = new Map();
let pinchState = null;
 
function updateTouchActionMode(){
  document.getElementById('pageSurface').classList.toggle('pan-mode', !state.settings.touchDraw);
}
function applyZoom(){ canvasWrapEl.style.transform = viewZoom === 1 ? '' : `scale(${viewZoom})`; }
function resetZoom(){
  viewZoom = 1;
  canvasWrapEl.style.transformOrigin = 'top center';
  applyZoom();
}
function gestureTouchDist(map){
  const pts = Array.from(map.values());
  return Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
}
canvasAreaEl.addEventListener('pointerdown', (e) => {
  if(e.pointerType !== 'touch' || state.settings.touchDraw) return;
  activeGestureTouches.set(e.pointerId, { x: e.clientX, y: e.clientY });

    const pts = Array.from(activeGestureTouches.values());
    const midX = (pts[0].x + pts[1].x) / 2, midY = (pts[0].y + pts[1].y) / 2;
    const rect = canvasWrapEl.getBoundingClientRect();
    const originX = rect.width ? ((midX - rect.left) / rect.width) * 100 : 50;
    const originY = rect.height ? ((midY - rect.top) / rect.height) * 100 : 0;

function widthFromPressure(base, p, tool){
  const pr = p > 0 ? p : 0.5;
  if(tool === 'paintbrush') return Math.max(1, base * (0.15 + pr * 1.9));
  return Math.max(1, base * (0.4 + pr * 1.2));

const scratchCanvas = document.createElement('canvas');
const scratchCtx = scratchCanvas.getContext('2d');
 
function strokeBBox(pts, pad){
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for(let i = 0; i < pts.length; i += 3){
    if(pts[i] < minX) minX = pts[i];
    if(pts[i] > maxX) maxX = pts[i];
    if(pts[i+1] < minY) minY = pts[i+1];
    if(pts[i+1] > maxY) maxY = pts[i+1];
  }
  return { minX: minX - pad, minY: minY - pad, maxX: maxX + pad, maxY: maxY + pad };

function paintStrokeShape(ctx, stroke, offsetX, offsetY){
  const { tool, color, width, pts } = stroke;
  const n = pts.length / 3;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = color; ctx.fillStyle = color;
  if(n === 1){
    const r = tool === 'highlighter' ? width / 2 : widthFromPressure(width, pts[2], tool) / 2;
    ctx.beginPath(); ctx.arc(pts[0] - offsetX, pts[1] - offsetY, Math.max(r, 0.6), 0, Math.PI * 2); ctx.fill();
    return;
  }
  for(let i = 0; i < n - 1; i++){
    const x1 = pts[i*3] - offsetX, y1 = pts[i*3+1] - offsetY, p1 = pts[i*3+2];
    const x2 = pts[(i+1)*3] - offsetX, y2 = pts[(i+1)*3+1] - offsetY, p2 = pts[(i+1)*3+2];
    const w = tool === 'highlighter' ? width : widthFromPressure(width, (p1+p2)/2, tool);
    ctx.lineWidth = w;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }

function drawStroke(ctx, stroke){
  const { tool, opacity, width, pts } = stroke;
  if(!pts || pts.length < 3) return;
  const n = pts.length / 3;
 
  if(tool === 'eraser'){
    // destination-out at full alpha is binary (a pixel is either erased or not), so
    // overlapping segments never double up visually — safe to draw segment-by-segment.
    ctx.save();
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.globalCompositeOperation = 'destination-out';
    ctx.globalAlpha = 1; ctx.strokeStyle = 'rgba(0,0,0,1)'; ctx.fillStyle = 'rgba(0,0,0,1)';
    if(n === 1){
      ctx.beginPath(); ctx.arc(pts[0], pts[1], Math.max(width * 1.1, 0.6), 0, Math.PI * 2); ctx.fill();
    } else {
      for(let i = 0; i < n - 1; i++){
        ctx.lineWidth = width * 2.2;
        ctx.beginPath(); ctx.moveTo(pts[i*3], pts[i*3+1]); ctx.lineTo(pts[(i+1)*3], pts[(i+1)*3+1]); ctx.stroke();

    return;
  }
 
  const op = opacity != null ? opacity : 1;
  if(op >= 0.999 || n === 1){
    // fully opaque, or a single dot: no overlapping translucent joins possible, draw directly.
    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = op;
    paintStrokeShape(ctx, stroke, 0, 0);
    ctx.restore();
    return;
  }
 
  // Translucent multi-segment stroke (highlighter, soft paintbrush): paint it fully opaque
  // onto a small offscreen buffer sized to the stroke's bounding box, then composite that
  // buffer onto the destination ONCE at the target opacity. This avoids the "beaded" look
  // that comes from alpha-blending many overlapping round-capped segments individually.
  const pad = width * 1.3 + 4;
  const bbox = strokeBBox(pts, pad);
  const bw = Math.max(1, Math.ceil(bbox.maxX - bbox.minX));
  const bh = Math.max(1, Math.ceil(bbox.maxY - bbox.minY));
  scratchCanvas.width = bw; scratchCanvas.height = bh;
  scratchCtx.clearRect(0, 0, bw, bh);
  paintStrokeShape(scratchCtx, stroke, bbox.minX, bbox.minY);
  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = op;
  ctx.drawImage(scratchCanvas, bbox.minX, bbox.minY);
  ctx.restore();
}
 
function redrawCurrentPage(){
  const page = currentPage();
  inkCtx.clearRect(0,0,PAGE_W,PAGE_H); overlayCtx.clearRect(0,0,PAGE_W,PAGE_H);
  if(!page) return;
  page.strokes.forEach(s => drawStroke(inkCtx, s));
  emptyHint.style.display = page.strokes.length === 0 ? 'block' : 'none';
}
 
function getPos(e){
  const rect = inkCanvas.getBoundingClientRect();
  const scaleX = PAGE_W / rect.width, scaleY = PAGE_H / rect.height;
  let pressure = e.pressure;
  if(pressure === undefined || pressure === 0) pressure = e.pointerType === 'touch' ? 0.6 : 0.5;
  return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY, p: pressure };
}
function eraseSegment(prevX, prevY, x, y, w){
  inkCtx.save();
  inkCtx.globalCompositeOperation = 'destination-out';
  inkCtx.lineCap = 'round'; inkCtx.lineJoin = 'round'; inkCtx.lineWidth = w;
  inkCtx.beginPath();
  if(prevX !== null){ inkCtx.moveTo(prevX, prevY); inkCtx.lineTo(x, y); }
  else { inkCtx.arc(x, y, w/2, 0, Math.PI*2); inkCtx.fill(); }
  inkCtx.stroke();
  inkCtx.restore();
}
function drawLiveOverlay(){
  overlayCtx.clearRect(0,0,PAGE_W,PAGE_H);
  const cfg = toolConfigs[currentTool];
  drawStroke(overlayCtx, { tool: currentTool, color: cfg.color, width: cfg.width, opacity: cfg.opacity != null ? cfg.opacity : 1, pts: currentPts });
}
function updateBrushCursor(clientX, clientY, visible){
  if(!visible){ brushCursor.style.display = 'none'; return; }
  const rect = inkCanvas.getBoundingClientRect();
  const cfg = toolConfigs[currentTool];
  const cssScale = rect.width / PAGE_W;
  const size = Math.max((currentTool === 'eraser' ? cfg.width * 2.2 : cfg.width) * cssScale, 4);
  brushCursor.style.display = 'block';
  brushCursor.style.width = size + 'px'; brushCursor.style.height = size + 'px';
  brushCursor.style.left = (clientX - rect.left) + 'px'; brushCursor.style.top = (clientY - rect.top) + 'px';
  brushCursor.style.borderColor = currentTool === 'eraser' ? 'var(--ink-soft)' : cfg.color;
}
inkCanvas.addEventListener('pointerdown', (e) => {
  if(!currentPage()) return;
  if(e.pointerType === 'touch' && !state.settings.touchDraw) return;
  if(activePointerId !== null) return;
  if(e.pointerType === 'pen' && state.settings.touchDraw){
    state.settings.touchDraw = false;
    updateTouchActionMode();
    scheduleSave();
    showToast('Switched off touch drawing since a stylus was detected.');
  }
  e.preventDefault();
  try{ inkCanvas.setPointerCapture(e.pointerId); }catch(err){}
  activePointerId = e.pointerId; drawing = true;
  const pos = getPos(e);
  if(currentTool === 'eraser'){
    currentPts = [pos.x, pos.y, pos.p];
    eraseSegment(null, null, pos.x, pos.y, toolConfigs.eraser.width * 2.2);
  } else {
    currentPts = [pos.x, pos.y, pos.p];
    drawLiveOverlay();
  }
  updateBrushCursor(e.clientX, e.clientY, true);
});
inkCanvas.addEventListener('pointermove', (e) => {
  if(e.pointerId !== activePointerId){
    if(!drawing && currentPage()) updateBrushCursor(e.clientX, e.clientY, true);
    return;
  }
  if(!drawing) return;
  const pos = getPos(e);
  if(currentTool === 'eraser'){
    const lastX = currentPts[currentPts.length - 3], lastY = currentPts[currentPts.length - 2];
    eraseSegment(lastX, lastY, pos.x, pos.y, toolConfigs.eraser.width * 2.2);
    currentPts.push(pos.x, pos.y, pos.p);
  } else {
    currentPts.push(pos.x, pos.y, pos.p);
    drawLiveOverlay();
  }
  updateBrushCursor(e.clientX, e.clientY, true);
});
function endStroke(e){
  if(e.pointerId !== activePointerId) return;
  drawing = false; activePointerId = null;
  const page = currentPage();
  if(!page){ currentPts = []; return; }
  if(currentPts.length >= 3){
    const cfg = toolConfigs[currentTool];
    const stroke = { tool: currentTool, color: cfg.color, width: cfg.width, opacity: cfg.opacity != null ? cfg.opacity : 1, pts: currentPts };
    if(currentTool !== 'eraser'){ overlayCtx.clearRect(0,0,PAGE_W,PAGE_H); drawStroke(inkCtx, stroke); }
    page.strokes.push(stroke);
    redoStacks[page.id] = [];
    const note = getCurrentNote(); if(note) note.updatedAt = Date.now();
    emptyHint.style.display = 'none';
    scheduleSave();
    updateUndoRedoButtons();
  }
  currentPts = [];
}
inkCanvas.addEventListener('pointerup', endStroke);
inkCanvas.addEventListener('pointercancel', endStroke);
inkCanvas.addEventListener('pointerleave', () => { brushCursor.style.display = 'none'; });
 
function undo(){
  const page = currentPage(); if(!page || !page.strokes.length) return;
  const stroke = page.strokes.pop();
  (redoStacks[page.id] = redoStacks[page.id] || []).push(stroke);
  redrawCurrentPage();
  const note = getCurrentNote(); if(note) note.updatedAt = Date.now();
  scheduleSave(); updateUndoRedoButtons();
}
function redo(){
  const page = currentPage(); if(!page) return;
  const stack = redoStacks[page.id]; if(!stack || !stack.length) return;
  page.strokes.push(stack.pop());
  redrawCurrentPage();
  const note = getCurrentNote(); if(note) note.updatedAt = Date.now();
  scheduleSave(); updateUndoRedoButtons();
}
function updateUndoRedoButtons(){
  const page = currentPage();
  document.getElementById('undoBtn').disabled = !page || page.strokes.length === 0;
  const stack = page ? redoStacks[page.id] : null;
  document.getElementById('redoBtn').disabled = !stack || stack.length === 0;
}
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);
document.getElementById('clearPageBtn').addEventListener('click', () => {
  const page = currentPage(); if(!page || !page.strokes.length) return;
  openConfirmModal({
    title: 'Clear this page?', danger: true, confirmLabel: 'Clear',
    message: 'All ink on this page will be removed. You can undo this right after.',
    onConfirm: () => {
      redoStacks[page.id] = page.strokes.slice().reverse();
      page.strokes = [];
      const note = getCurrentNote(); if(note) note.updatedAt = Date.now();
      redrawCurrentPage(); scheduleSave(); updateUndoRedoButtons();
    }
  });
});
 
/* ============================= Views ============================= */
function showView(view){
  document.getElementById('homeView').style.display = view === 'home' ? 'flex' : 'none';
  document.getElementById('editorView').style.display = view === 'editor' ? 'flex' : 'none';
}
function renderThumbnail(note, w, h){
  const off = document.createElement('canvas'); off.width = w; off.height = h;
  const octx = off.getContext('2d');
  octx.fillStyle = '#fff'; octx.fillRect(0,0,w,h);
  const cover = note.pages[0];
  if(cover){
    octx.save(); octx.scale(w / PAGE_W, h / PAGE_H);
    cover.strokes.forEach(s => drawStroke(octx, s));
    octx.restore();
  }
  return off.toDataURL('image/png');
}
function renderHome(){
  const grid = document.getElementById('notesGrid');
  const emptyState = document.getElementById('homeEmptyState');
  grid.innerHTML = '';
  if(!state.notes.length){ emptyState.style.display = 'flex'; grid.style.display = 'none'; return; }
  emptyState.style.display = 'none'; grid.style.display = 'grid';
  state.notes.slice().sort((a,b) => b.updatedAt - a.updatedAt).forEach(note => grid.appendChild(renderNoteCard(note)));
}
function renderNoteCard(note){
  const wrap = document.createElement('div'); wrap.className = 'note-card-wrap';
  const card = document.createElement('div'); card.className = 'note-card';
  const img = document.createElement('img'); img.alt = '';
  img.src = renderThumbnail(note, 300, Math.round(300 * PAGE_H / PAGE_W));
  card.appendChild(img);
  const kebab = document.createElement('button'); kebab.className = 'card-kebab'; kebab.type = 'button';
  kebab.title = 'Note options';
  kebab.innerHTML = KEBAB_ICON;
  kebab.addEventListener('click', (e) => {
    e.stopPropagation();
    openItemMenu(kebab, [
      { label: 'Add page', icon: PLUS_ICON, onClick: () => {
        const pg = freshPage();
        note.pages.push(pg);
        note.updatedAt = Date.now();
        scheduleSave();
        showToast('Page added to "' + note.name + '".', 'success');
      }},
      { label: 'Delete note', icon: TRASH_ICON, danger: true, onClick: () => {
        openConfirmModal({
          title: 'Delete note?', danger: true, confirmLabel: 'Delete',
          message: `"${note.name}" will be permanently deleted.`,
          onConfirm: () => deleteNote(note)
        });
      }}
    ]);
  });
  card.appendChild(kebab);
  card.addEventListener('click', () => openEditor(note.id));
  wrap.appendChild(card);
  const nameInput = document.createElement('input');
  nameInput.type = 'text'; nameInput.className = 'note-name-input'; nameInput.value = note.name;
  nameInput.addEventListener('click', e => e.stopPropagation());
  nameInput.addEventListener('pointerdown', e => e.stopPropagation());
  nameInput.addEventListener('blur', () => {
    note.name = nameInput.value.trim() || 'Untitled note'; nameInput.value = note.name; note.updatedAt = Date.now(); scheduleSave();
  });
  nameInput.addEventListener('keydown', e => { if(e.key === 'Enter') nameInput.blur(); });
  wrap.appendChild(nameInput);
  return wrap;
}
function createNote(){
  openTemplatePicker((templateId) => {
    const note = freshNote('Untitled note', templateId);
    state.notes.push(note);
    scheduleSave();
    openEditor(note.id, note.pages[0].id);
  });
}
function deleteNote(note){
  state.notes = state.notes.filter(n => n.id !== note.id);
  note.pages.forEach(p => delete redoStacks[p.id]);
  if(currentNoteId === note.id){ currentNoteId = null; currentPageId = null; showView('home'); }
  renderHome(); scheduleSave();
}
function openEditor(noteId, pageId){
  currentNoteId = noteId;
  const note = getCurrentNote();
  if(!note) return;
  currentPageId = pageId || (note.pages[0] && note.pages[0].id);
  showView('editor');
  document.getElementById('pageSurface').className = 'page-surface tpl-' + (note.template || 'dots');
  updateTouchActionMode();
  resetZoom();
  setCanvasSize();
  redrawCurrentPage();
  document.getElementById('noteTitle').textContent = note.name;
  updateUndoRedoButtons();
  updatePageNavUI();
  setActiveTool(currentTool);
}
document.getElementById('newNoteBtn').addEventListener('click', createNote);
document.getElementById('emptyNewNoteBtn').addEventListener('click', createNote);
document.getElementById('backBtn').addEventListener('click', () => { showView('home'); renderHome(); });
document.getElementById('noteTitle').addEventListener('blur', () => {
  const note = getCurrentNote(); if(!note) return;
  const val = document.getElementById('noteTitle').textContent.trim();
  note.name = val || 'Untitled note'; note.updatedAt = Date.now();
  document.getElementById('noteTitle').textContent = note.name;
  scheduleSave();
});
document.getElementById('noteTitle').addEventListener('keydown', (e) => { if(e.key === 'Enter'){ e.preventDefault(); document.getElementById('noteTitle').blur(); } });
document.getElementById('deleteNoteBtn').addEventListener('click', () => {
  const note = getCurrentNote(); if(!note) return;
  openConfirmModal({
    title: 'Delete note?', danger: true, confirmLabel: 'Delete',
    message: `"${note.name}" and all its pages will be permanently deleted.`,
    onConfirm: () => deleteNote(note)
  });
});
 
/* ---- Page navigation ---- */
function updatePageNavUI(){
  const note = getCurrentNote(); if(!note) return;
  const idx = note.pages.findIndex(p => p.id === currentPageId);
  document.getElementById('pageIndicator').textContent = `Page ${idx + 1} of ${note.pages.length}`;
  document.getElementById('prevPageBtn').disabled = idx <= 0;
  document.getElementById('nextPageBtn').disabled = idx >= note.pages.length - 1;
  document.getElementById('deletePageBtn').disabled = note.pages.length <= 1;
}
function goToPage(delta){
  const note = getCurrentNote(); if(!note) return;
  const idx = note.pages.findIndex(p => p.id === currentPageId);
  const newIdx = idx + delta;
  if(newIdx < 0 || newIdx >= note.pages.length) return;
  currentPageId = note.pages[newIdx].id;
  resetZoom(); setCanvasSize(); redrawCurrentPage(); updateUndoRedoButtons(); updatePageNavUI();
}
document.getElementById('prevPageBtn').addEventListener('click', () => goToPage(-1));
document.getElementById('nextPageBtn').addEventListener('click', () => goToPage(1));
document.getElementById('addPageBtn').addEventListener('click', () => {
  const note = getCurrentNote(); if(!note) return;
  const pg = freshPage();
  const idx = note.pages.findIndex(p => p.id === currentPageId);
  note.pages.splice(idx + 1, 0, pg);
  currentPageId = pg.id;
  note.updatedAt = Date.now();
  resetZoom(); setCanvasSize(); redrawCurrentPage(); updateUndoRedoButtons(); updatePageNavUI(); scheduleSave();
});
document.getElementById('deletePageBtn').addEventListener('click', () => {
  const note = getCurrentNote(); if(!note || note.pages.length <= 1) return;
  openConfirmModal({
    title: 'Delete this page?', danger: true, confirmLabel: 'Delete',
    message: 'This page will be permanently deleted.',
    onConfirm: () => {
      const idx = note.pages.findIndex(p => p.id === currentPageId);
      delete redoStacks[currentPageId];
      note.pages.splice(idx, 1);
      currentPageId = note.pages[Math.max(0, idx - 1)].id;
      note.updatedAt = Date.now();
      resetZoom(); setCanvasSize(); redrawCurrentPage(); updateUndoRedoButtons(); updatePageNavUI(); scheduleSave();
    }
  });
});
 
/* ============================= Toolbar ============================= */
function setActiveTool(tool){
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
  renderStyleRow();
}
document.querySelectorAll('.tool-btn').forEach(btn => btn.addEventListener('click', () => setActiveTool(btn.dataset.tool)));
 
function renderStyleRow(){
  const row = document.getElementById('styleRow');
  const swatchRow = document.getElementById('swatchRow');
  const colorInputWrap = document.getElementById('customColorInput');
  row.classList.add('visible');
  const showColor = currentTool === 'pen' || currentTool === 'paintbrush' || currentTool === 'highlighter';
  swatchRow.style.display = showColor ? 'flex' : 'none';
  colorInputWrap.style.display = showColor ? 'inline-block' : 'none';
 
  swatchRow.innerHTML = '';
  if(showColor){
    const cfg = toolConfigs[currentTool];
    COLORS.forEach(c => {
      const b = document.createElement('button');
      b.className = 'swatch' + (cfg.color.toLowerCase() === c.toLowerCase() ? ' active' : '');
      b.style.background = c; b.title = c;
      b.addEventListener('click', () => { toolConfigs[currentTool].color = c; renderStyleRow(); });
      swatchRow.appendChild(b);
    });
  }
  const range = WIDTH_RANGES[currentTool];
  const slider = document.getElementById('widthSlider');
  slider.min = range.min; slider.max = range.max; slider.step = 0.5;
  slider.value = toolConfigs[currentTool].width;
  document.getElementById('widthValue').textContent = Math.round(toolConfigs[currentTool].width) + 'px';
}
document.getElementById('widthSlider').addEventListener('input', (e) => {
  toolConfigs[currentTool].width = parseFloat(e.target.value);
  document.getElementById('widthValue').textContent = Math.round(toolConfigs[currentTool].width) + 'px';
});
document.getElementById('customColorInput').addEventListener('input', (e) => {
  if(currentTool === 'pen' || currentTool === 'paintbrush' || currentTool === 'highlighter'){
    toolConfigs[currentTool].color = e.target.value; renderStyleRow();
  }
});
 
/* ============================= Settings ============================= */
document.getElementById('settingsBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('touchDrawToggle').checked = state.settings.touchDraw;
  const r = e.currentTarget.getBoundingClientRect();
  settingsPopover.style.top = (r.bottom + 6) + 'px';
  settingsPopover.style.left = Math.max(8, Math.min(r.left - 150, window.innerWidth - 240)) + 'px';
  settingsPopover.classList.toggle('open');
});
document.getElementById('touchDrawToggle').addEventListener('change', (e) => { state.settings.touchDraw = e.target.checked; updateTouchActionMode(); scheduleSave(); });
document.getElementById('clearDataBtn').addEventListener('click', () => {
  settingsPopover.classList.remove('open');
  openConfirmModal({
    title: 'Erase all data?', danger: true, confirmLabel: 'Erase everything',
    message: 'Every note in Fly Notes will be permanently deleted. This cannot be undone.',
    onConfirm: async () => {
      state = defaultState(); currentNoteId = null; currentPageId = null;
      await saveState();
      showView('home'); renderHome();
      showToast('All data erased.', 'success');
    }
  });
});
 
/* ============================= Spotlight (search) ============================= */
const spotlightOverlay = document.getElementById('spotlightOverlay');
function openSpotlight(){
  if(!currentPage()) return;
  spotlightOverlay.classList.add('open');
  document.getElementById('spotlightInput').value = '';
  clearSpotlightSearch();
  setTimeout(() => document.getElementById('spotlightInput').focus(), 30);
}
function closeSpotlight(){ spotlightOverlay.classList.remove('open'); }
document.getElementById('spotlightBtn').addEventListener('click', openSpotlight);
document.getElementById('spotlightCloseBtn').addEventListener('click', closeSpotlight);
spotlightOverlay.addEventListener('click', (e) => { if(e.target === spotlightOverlay) closeSpotlight(); });
document.addEventListener('keydown', (e) => {
  const mod = e.ctrlKey || e.metaKey;
  if(mod && e.key.toLowerCase() === 'k'){ e.preventDefault(); if(spotlightOverlay.classList.contains('open')) closeSpotlight(); else openSpotlight(); }
  else if(e.key === 'Escape'){ closeSpotlight(); closeModal(); }
  const tag = (e.target.tagName || '').toLowerCase();
  if(tag === 'input' || tag === 'textarea' || e.target.isContentEditable) return;
  if(mod && e.key.toLowerCase() === 'z' && !e.shiftKey){ e.preventDefault(); undo(); }
  else if(mod && ((e.key.toLowerCase() === 'z' && e.shiftKey) || e.key.toLowerCase() === 'y')){ e.preventDefault(); redo(); }
  else if(e.key === '1') setActiveTool('pen');
  else if(e.key === '2') setActiveTool('paintbrush');
  else if(e.key === '3') setActiveTool('highlighter');
  else if(e.key === '4') setActiveTool('eraser');
});
 
function clearSpotlightSearch(){
  document.getElementById('spSearchResultsWrap').style.display = 'none';
  document.getElementById('spSearchResults').innerHTML = '';
  document.getElementById('spSearchHint').style.display = 'block';
}
function renderSearchHits(items){
  document.getElementById('spSearchHint').style.display = 'none';
  const box = document.getElementById('spSearchResults');
  document.getElementById('spSearchResultsWrap').style.display = 'block';
  box.innerHTML = '';
  if(!items.length){ const e = document.createElement('div'); e.className = 'spotlight-result empty'; e.textContent = 'No matches found.'; box.appendChild(e); return; }
  items.forEach(it => {
    const row = document.createElement('div'); row.className = 'search-hit';
    row.innerHTML = `<div class="sh-title"></div>`;
    row.querySelector('.sh-title').textContent = it.label;
    row.addEventListener('click', () => { closeSpotlight(); openEditor(it.noteId, it.pageId); });
    box.appendChild(row);
  });
}
function allPagesFlat(){
  const list = [];
  state.notes.forEach(n => n.pages.forEach((p, i) => list.push({ note: n, page: p, index: i })));
  return list;
}
document.getElementById('spotlightInput').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  if(!q){ clearSpotlightSearch(); return; }
  const matches = allPagesFlat().filter(it => (it.note.name || '').toLowerCase().includes(q));
  renderSearchHits(matches.map(it => ({ noteId: it.note.id, pageId: it.page.id, label: it.note.name + (it.note.pages.length > 1 ? ' — page ' + (it.index+1) : '') })));
});
 
/* ============================= Init ============================= */
async function init(){
  await loadState();
  showView('home');
  renderHome();
  renderStyleRow();
}
init();
 
})();
</script>
